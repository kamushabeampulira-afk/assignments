<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <title>Supplier Registration Form</title>
    <style>
      h3,
      h5 {
        text-align: center;
      }
      body {
        margin: 20px;
        background-color: whitesmoke;
      }
    </style>
  </head>
  <body>

    <div>
      <h3>Supplier Registration Form</h3>
    </div>

    <div class="card-body">
      <form>
        <h5 class="text-primary" mt-4 mb-3>Supplier Information</h5>

        <div class="row mb-3">
          <div class="col-md-6">
            <label class="form-label">Company Name</label>
            <input
              type="text"
              class="form-control"
              placeholder="Enter company name"
              required
            />
          </div>

          <div class="col-md-6">
            <label class="form-label">Business Registration Number</label>
            <input type="text" class="form-control" />
          </div>
        </div>

        <div class="row mb-3">
          <div class="col-md-6">
            <label class="form-label">Supplier Type</label>
            <select class="form-select">
              <option>Select type</option>
              <option>Manufacturer</option>
              <option>Distributor</option>
              <option>Wholesaler</option>
              <option>Service Provider</option>
            </select>
          </div>

          <div class="col-md-6">
            <label class="form-label">Website</label>
            <input
              type="url"
              class="form-control"
              placeholder="www.example.com"
            />
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Physical Address</label>
          <input type="text" class="form-control" />
        </div>

        <div class="mb-3">
          <label class="form-label">Postal Address</label>
          <input type="text" class="form-control" />
        </div>

        <h5 class="text-primary mb-3">Contact Person</h5>

        <div class="row mb-3">
          <div class="col-md-6">
            <label class="form-label">Full Name</label>
            <input type="text" class="form-control" />
          </div>

          <div class="col-md-6">
            <label class="form-label">Position / Title</label>
            <input type="text" class="form-control" />
          </div>
        </div>

        <div class="row mb-3">
          <div class="col-md-6">
            <label class="form-label">Phone Number</label>
            <input type="tel" class="form-control" />
          </div>

          <div class="col-md-6">
            <label class="form-label">Email Address</label>
            <input type="email" class="form-control" />
          </div>
        </div>
        <h5 class="text-primary mt-4 mb-3">Banking Details</h5>

        <div class="row mb-3">
          <div class="col-md-6">
            <label class="form-label">Bank Name</label>
            <input type="text" class="form-control" />
          </div>

          <div class="col-md-6">
            <label class="form-label">Account Name</label>
            <input type="text" class="form-control" />
          </div>
        </div>

        <div class="row mb-3">
          <div class="col-md-6">
            <label class="form-label">Account Number</label>
            <input type="text" class="form-control" />
          </div>

          <div class="col-md-6">
            <label class="form-label">Branch</label>
            <input type="text" class="form-control" />
          </div>
        </div>
        <h5 class="text-primary mt-4 mb-3">Tax Information</h5>

        <div class="row mb-3">
          <div class="col-md-6">
            <label class="form-label">Tax Identification Number (TIN)</label>
            <input type="text" class="form-control" />
          </div>

          <div class="col-md-6">
            <label class="form-label">VAT Registration Number</label>
            <input type="text" class="form-control" />
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Upload Tax Certificate</label>
          <input type="file" class="form-control" />
        </div>

        <h5 class="text-primary mt-4 mb-3">Goods / Services Provided</h5>

        <div class="mb-3">
          <label class="form-label">Description</label>
          <textarea
            class="form-control"
            rows="4"
            placeholder="Describe products or services supplied"
          ></textarea>
        </div>

        <h5 class="text-primary mt-4 mb-3">Declaration</h5>

        <div class="form-check mb-3">
          <input class="form-check-input" type="checkbox" required />
          <label class="form-check-label">
            I confirm that the information provided is true and correct.
          </label>
        </div>

        <div class="text-center">
          <input class="btn btn-primary" type="submit" value="Submit" />

          <button type="reset" class="btn btn-secondary">Reset Form</button>
        </div>
      </form>
    </div>
  </body>
</html>
