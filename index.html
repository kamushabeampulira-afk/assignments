  <body>

   <div class=" border border-3 p-4 mp-3 mx-auto" style="max-width: 800px;">
    <div>
      <h3 CLASS="mb-4">SUPPLIER REGISTRATION FORM</h3>
    </div>

    <!-- <div class="card-body"> -->
      <form>
        <h5 class="text-dark" mt-4 mb-5>Supplier Information</h5>
        <div class="row mb-3">
          <div class="col-md-6">
            <label class="form-label">Company Name</label>
            <input
              type="text"
              class="form-control"
              placeholder="Enter company name"
              required
            />
          </div>

          <div class="col-md-6">
            <label class="form-label">Business Registration Number</label>
            <input type="text" class="form-control" />
          </div>
        </div>

        <div class="row mb-3">
          <div class="col-md-6">
            <label class="form-label">Supplier Type</label>
            <select class="form-select">
              <option>Select type</option>
              <option>Manufacturer</option>
              <option>Distributor</option>
              <option>Wholesaler</option>
              <option>Service Provider</option>
            </select>
          </div>

          <div class="col-md-6">
            <label class="form-label">Website</label>
            <input
              type="url"
              class="form-control"
              placeholder="www.example.com"
            />
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Physical Address</label>
          <input type="text" class="form-control" />
        </div>

        <div class="mb-3">
          <label class="form-label">Postal Address</label>
          <input type="text" class="form-control" />
        </div>

        <h5 class="text-dark mb-5">Contact Person</h5>

        <div class="row mb-3">
          <div class="col-md-6">
            <label class="form-label">Full Name</label>
            <input type="text" class="form-control" />
          </div>

          <div class="col-md-6">
            <label class="form-label">Position / Title</label>
            <input type="text" class="form-control" />
          </div>
        </div>

        <div class="row mb-3">
          <div class="col-md-6">
            <label class="form-label">Phone Number</label>
            <input type="tel" class="form-control" />
          </div>

          <div class="col-md-6">
            <label class="form-label">Email Address</label>
            <input type="email" class="form-control" />
          </div>
        </div>
        <h5 class="text-dark mt-4 mb-5">Banking Details</h5>

        <div class="row mb-3">
          <div class="col-md-6">
            <label class="form-label">Bank Name</label>
            <input type="text" class="form-control" />
          </div>

          <div class="col-md-6">
            <label class="form-label">Account Name</label>
            <input type="text" class="form-control" />
          </div>
        </div>

        <div class="row mb-3">
          <div class="col-md-6">
            <label class="form-label">Account Number</label>
            <input type="text" class="form-control" />
          </div>

          <div class="col-md-6">
            <label class="form-label">Branch</label>
            <input type="text" class="form-control" />
          </div>
        </div>
        <h5 class="text-dark mt-4 mb-5">Tax Information</h5>

        <div class="row mb-3">
          <div class="col-md-6">
            <label class="form-label">Tax Identification Number (TIN)</label>
            <input type="text" class="form-control" />
          </div>

          <div class="col-md-6">
            <label class="form-label">VAT Registration Number</label>
            <input type="text" class="form-control" />
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Upload Tax Certificate</label>
          <input type="file" class="form-control" />
        </div>

        <h5 class="text-dark mt-4 mb-5">Goods / Services Provided</h5>

        <div class="mb-3">
          <label class="form-label">Description</label>
          <textarea
            class="form-control"
            rows="4"
            placeholder="Describe products or services supplied"
          ></textarea>
        </div>

        <h5 class="text-dark mt-4 mb-5">Declaration</h5>

        <div class="form-check mb-3">
          <input class="form-check-input" type="checkbox" required />
          <label class="form-check-label">
            I confirm that the information provided is true and correct.
          </label>
        </div>

        <div class="row">
          <div class="col">
          <input class="btn btn-primary" type="submit" value="Submit" />
          </div>
          <div class="col">
          <div class="text-end">
            <button type="reset" class="btn btn-secondary">Reset Form</button>
          </div>
          </div>
        </div>
      </div>
      </form>
  </body>
</html>
